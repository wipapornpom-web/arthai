from pathlib import Path

html = r"""<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>เกม AI ใช้มือเติมคำ ภาษาไทย</title>
<style>
  body{margin:0;font-family:sans-serif;background:#111;color:white;overflow:hidden}
  #wrap{position:relative;width:100vw;height:100vh;background:#111}
  video,canvas{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transform:scaleX(-1)}
  #game{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:22px;pointer-events:none}
  h1{font-size:42px;margin:0;text-shadow:2px 2px 6px #000}
  #word{font-size:82px;background:rgba(0,0,0,.55);padding:18px 40px;border-radius:26px;border:4px solid #fff}
  #choices{display:flex;gap:35px}
  .choice{font-size:74px;background:#ffd84d;color:#111;width:130px;height:130px;border-radius:30px;display:flex;align-items:center;justify-content:center;border:6px solid white;box-shadow:0 8px 20px #000}
  #msg{font-size:48px;font-weight:bold;height:60px;text-shadow:2px 2px 6px #000}
  #start{position:absolute;z-index:5;left:50%;top:50%;transform:translate(-50%,-50%);font-size:32px;padding:22px 36px;border-radius:18px;border:0;background:#37d67a;color:#111;font-weight:bold}
  #tip{position:absolute;left:16px;bottom:12px;background:rgba(0,0,0,.55);padding:10px 14px;border-radius:12px;font-size:18px}
  #cursor{position:absolute;width:38px;height:38px;border-radius:50%;background:#29d9ff;border:5px solid white;box-shadow:0 0 22px #29d9ff;z-index:4;display:none;transform:translate(-50%,-50%)}
</style>
</head>
<body>
<div id="wrap">
  <video id="video" autoplay playsinline></video>
  <canvas id="canvas"></canvas>
  <div id="cursor"></div>
  <button id="start">เริ่มเกม / เปิดกล้อง</button>
  <div id="game">
    <h1>ใช้มือชี้เลือกตัวอักษรที่ถูกต้อง</h1>
    <div id="word">ครอ_ครัว</div>
    <div id="choices"></div>
    <div id="msg"></div>
  </div>
  <div id="tip">วิธีเล่น: ยกนิ้วชี้หน้ากล้อง แล้วชี้ค้างบนตัวเลือก 1 วินาที</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<script>
const rounds = [
  {word:"ครอ_ครัว", answer:"บ", choices:["บ","ด","ม"]},
  {word:"ค_าย", answer:"ว", choices:["ว","น","ซ"]},
  {word:"หมึก_ำ", answer:"ด", choices:["ด","ต","บ"]},
  {word:"เหนื่อย_้า", answer:"ล", choices:["ล","ร","ว"]},
  {word:"ใบห_อน", answer:"ม่", choices:["ม่","ม","น"]},
  {word:"พระจั_ทร์", answer:"น", choices:["น","ณ","ม"]},
  {word:"สงกรา_ต์", answer:"น", choices:["น","ณ","ม"]},
  {word:"ตาลโต_ด", answer:"น", choices:["น","ม","ล"]}
];
let idx = 0, hoverTarget = null, hoverStart = 0, locked = false;
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const cursor = document.getElementById('cursor');
const choicesEl = document.getElementById('choices');
const wordEl = document.getElementById('word');
const msgEl = document.getElementById('msg');

function renderRound(){
  const r = rounds[idx % rounds.length];
  wordEl.textContent = r.word;
  msgEl.textContent = "";
  choicesEl.innerHTML = "";
  r.choices.forEach(ch=>{
    const d = document.createElement('div');
    d.className='choice';
    d.textContent=ch;
    d.dataset.value=ch;
    choicesEl.appendChild(d);
  });
  locked=false;
}
renderRound();

function speak(text){
  try{
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'th-TH';
    speechSynthesis.cancel();
    speechSynthesis.speak(u);
  }catch(e){}
}

function checkHit(x,y){
  if(locked) return;
  const els = document.querySelectorAll('.choice');
  let found = null;
  els.forEach(el=>{
    const r = el.getBoundingClientRect();
    if(x>=r.left && x<=r.right && y>=r.top && y<=r.bottom) found = el;
  });
  if(!found){ hoverTarget=null; hoverStart=0; return; }
  if(hoverTarget !== found){
    hoverTarget = found;
    hoverStart = performance.now();
    found.style.transform = "scale(1.12)";
  }else if(performance.now() - hoverStart > 900){
    locked = true;
    const r = rounds[idx % rounds.length];
    if(found.dataset.value === r.answer){
      msgEl.textContent = "ถูกต้อง เก่งมาก!";
      msgEl.style.color = "#55ff8a";
      speak("ถูกต้อง เก่งมาก");
      setTimeout(()=>{idx++; renderRound();}, 1800);
    }else{
      msgEl.textContent = "ลองอีกครั้ง";
      msgEl.style.color = "#ff5b5b";
      speak("ลองอีกครั้ง");
      setTimeout(()=>{locked=false; msgEl.textContent="";}, 1200);
    }
  }
  els.forEach(el=>{ if(el!==found) el.style.transform="scale(1)"; });
}

function resize(){
  canvas.width = innerWidth;
  canvas.height = innerHeight;
}
addEventListener('resize', resize); resize();

async function start(){
  document.getElementById('start').style.display='none';
  const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
  hands.setOptions({
    maxNumHands: 1,
    modelComplexity: 1,
    minDetectionConfidence: 0.65,
    minTrackingConfidence: 0.65
  });
  hands.onResults(results=>{
    ctx.clearRect(0,0,canvas.width,canvas.height);
    if(results.multiHandLandmarks && results.multiHandLandmarks.length){
      const p = results.multiHandLandmarks[0][8]; // index fingertip
      const x = (1 - p.x) * innerWidth;  // mirrored
      const y = p.y * innerHeight;
      cursor.style.display = 'block';
      cursor.style.left = x + 'px';
      cursor.style.top = y + 'px';
      checkHit(x,y);
    }else{
      cursor.style.display='none';
    }
  });
  const camera = new Camera(video, {
    onFrame: async () => { await hands.send({image: video}); },
    width: 1280, height: 720
  });
  camera.start();
}
document.getElementById('start').addEventListener('click', start);
</script>
</body>
</html>
"""
path = Path("/mnt/data/thai_ai_hand_game.html")
path.write_text(html, encoding="utf-8")
path.as_posix()
